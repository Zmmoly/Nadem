<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نديم — رفيقك في حفظ القرآن الكريم</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #C9A84C;
  --gold-light: #E8D5A3;
  --gold-dark: #8B6914;
  --bg: #121212;
  --bg2: #1A1A1A;
  --bg3: #222222;
  --surface: #1E1E1E;
  --text: #F0EBE0;
  --text-muted: rgba(240,235,224,0.5);
  --border: rgba(201,168,76,0.15);
}

* { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior:smooth; }

body {
  font-family: 'Tajawal', sans-serif;
  background: var(--bg);
  color: var(--text);
  overflow-x: hidden;
}

/* NAV */
nav {
  position: fixed;
  top: 0;
  width: 100%;
  z-index: 999;
  padding: 18px 48px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  transition: background 0.4s;
  background: rgba(18,18,18,0.9);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
}

.nav-logo {
  font-family: 'Amiri', serif;
  font-size: 1.7rem;
  color: var(--gold);
  letter-spacing: 2px;
}

.nav-links {
  display: flex;
  gap: 36px;
  list-style: none;
}

.nav-links a {
  color: var(--text-muted);
  text-decoration: none;
  font-size: 0.9rem;
  font-weight: 500;
  letter-spacing: 0.5px;
  transition: color 0.3s;
}

.nav-links a:hover { color: var(--gold); }

/* HERO */
.hero {
  min-height: 100vh;
  display: grid;
  grid-template-columns: 1fr 1fr;
  align-items: center;
  gap: 60px;
  padding: 120px 80px 80px;
  position: relative;
  overflow: hidden;
  background: radial-gradient(ellipse 80% 70% at 30% 50%, rgba(201,168,76,0.04) 0%, transparent 70%),
              linear-gradient(160deg, #181818 0%, #121212 100%);
}

.hero::after {
  content: '';
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 1px;
  background: linear-gradient(to right, transparent, var(--gold), transparent);
}

.hero-text { position: relative; z-index: 2; }

.hero-eyebrow {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  color: var(--gold);
  font-size: 0.8rem;
  letter-spacing: 3px;
  font-weight: 600;
  margin-bottom: 28px;
  text-transform: uppercase;
}

.hero-eyebrow::before, .hero-eyebrow::after {
  content: '✦';
  font-size: 0.6rem;
}

.hero-ayah {
  font-family: 'Amiri', serif;
  font-size: 1.6rem;
  color: var(--gold-light);
  line-height: 2;
  margin-bottom: 6px;
}

.hero-ayah-ref {
  font-size: 0.75rem;
  color: var(--text-muted);
  letter-spacing: 1px;
  margin-bottom: 40px;
}

h1 {
  font-family: 'Amiri', serif;
  font-size: clamp(3.5rem, 8vw, 6rem);
  color: var(--gold);
  line-height: 1;
  margin-bottom: 20px;
  text-shadow: 0 0 80px rgba(201,168,76,0.2);
}

.hero-desc {
  font-size: 1.1rem;
  color: var(--text-muted);
  line-height: 1.9;
  font-weight: 300;
  margin-bottom: 48px;
  max-width: 420px;
}

.hero-btns {
  display: flex;
  gap: 14px;
  flex-wrap: wrap;
}

.btn-gold {
  background: linear-gradient(135deg, var(--gold) 0%, var(--gold-dark) 100%);
  color: #1A1000;
  padding: 15px 36px;
  border-radius: 50px;
  text-decoration: none;
  font-weight: 700;
  font-size: 0.95rem;
  transition: all 0.3s;
  box-shadow: 0 8px 24px rgba(201,168,76,0.25);
}

.btn-gold:hover {
  transform: translateY(-2px);
  box-shadow: 0 14px 32px rgba(201,168,76,0.35);
}

.btn-outline {
  border: 1px solid rgba(201,168,76,0.35);
  color: var(--gold-light);
  padding: 15px 36px;
  border-radius: 50px;
  text-decoration: none;
  font-size: 0.95rem;
  transition: all 0.3s;
}

.btn-outline:hover {
  background: rgba(201,168,76,0.08);
  border-color: var(--gold);
}

/* Phone mockup */
.hero-visual {
  display: flex;
  justify-content: center;
  align-items: center;
  position: relative;
}

.phone-mockup {
  position: relative;
  width: 280px;
}

.phone-frame {
  position: relative;
  border-radius: 40px;
  overflow: hidden;
  border: 2px solid rgba(201,168,76,0.3);
  box-shadow:
    0 0 0 8px rgba(201,168,76,0.04),
    0 40px 80px rgba(0,0,0,0.6),
    0 0 40px rgba(201,168,76,0.08);
}

.phone-frame img {
  width: 100%;
  display: block;
}

.phone-glow {
  position: absolute;
  inset: -30px;
  background: radial-gradient(ellipse, rgba(201,168,76,0.12), transparent 70%);
  border-radius: 50%;
  z-index: -1;
}

/* FEATURES */
.features {
  padding: 100px 80px;
  background: var(--bg2);
  position: relative;
}

.section-header {
  text-align: center;
  margin-bottom: 64px;
}

.section-tag {
  display: inline-block;
  background: rgba(201,168,76,0.1);
  border: 1px solid rgba(201,168,76,0.2);
  color: var(--gold);
  padding: 5px 18px;
  border-radius: 100px;
  font-size: 0.78rem;
  letter-spacing: 2px;
  margin-bottom: 20px;
  font-weight: 600;
}

.section-title {
  font-family: 'Amiri', serif;
  font-size: clamp(2rem, 4vw, 2.8rem);
  color: var(--text);
  margin-bottom: 14px;
  line-height: 1.3;
}

.section-sub {
  color: var(--text-muted);
  font-size: 0.95rem;
  max-width: 480px;
  margin: 0 auto;
  line-height: 1.8;
}

.features-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px;
  max-width: 1100px;
  margin: 0 auto;
}

.feat-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 36px 28px;
  transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
  position: relative;
  overflow: hidden;
}

.feat-card::after {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 20px;
  background: linear-gradient(135deg, rgba(201,168,76,0.06), transparent);
  opacity: 0;
  transition: opacity 0.4s;
}

.feat-card:hover {
  border-color: rgba(201,168,76,0.35);
  transform: translateY(-6px);
  box-shadow: 0 20px 50px rgba(0,0,0,0.4), 0 0 30px rgba(201,168,76,0.06);
}

.feat-card:hover::after { opacity: 1; }

.feat-icon {
  font-size: 2.2rem;
  margin-bottom: 18px;
  display: block;
}

.feat-title {
  font-size: 1.1rem;
  font-weight: 700;
  color: var(--gold-light);
  margin-bottom: 10px;
}

.feat-desc {
  color: var(--text-muted);
  font-size: 0.9rem;
  line-height: 1.8;
  font-weight: 300;
}

/* SCREENSHOTS */
.screenshots {
  padding: 100px 80px;
  background: var(--bg);
  overflow: hidden;
}

.screens-showcase {
  display: flex;
  gap: 32px;
  justify-content: center;
  align-items: flex-end;
  margin-top: 64px;
  flex-wrap: wrap;
}

.screen-item {
  text-align: center;
  flex: 1;
  min-width: 220px;
  max-width: 280px;
}

.screen-item.featured {
  transform: scale(1.08);
}

.screen-frame {
  border-radius: 32px;
  overflow: hidden;
  border: 1.5px solid rgba(201,168,76,0.25);
  box-shadow:
    0 30px 60px rgba(0,0,0,0.5),
    0 0 30px rgba(201,168,76,0.06);
  transition: all 0.4s;
  background: #1A1A1A;
}

.screen-frame:hover {
  border-color: rgba(201,168,76,0.5);
  transform: translateY(-8px);
  box-shadow: 0 40px 80px rgba(0,0,0,0.6), 0 0 40px rgba(201,168,76,0.1);
}

.screen-frame img {
  width: 100%;
  display: block;
}

.screen-label {
  margin-top: 20px;
  font-size: 0.85rem;
  color: var(--text-muted);
  letter-spacing: 1px;
}

.screen-label strong {
  display: block;
  color: var(--gold-light);
  font-size: 1rem;
  margin-bottom: 4px;
}

/* CONTACT */
.contact {
  padding: 100px 80px;
  background: var(--bg2);
}

.contact-inner {
  max-width: 600px;
  margin: 0 auto;
  text-align: center;
}

.contact-form {
  margin-top: 48px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.form-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
}

.form-group {
  display: flex;
  flex-direction: column;
  gap: 8px;
  text-align: right;
}

.form-group label {
  font-size: 0.85rem;
  color: var(--text-muted);
  font-weight: 500;
}

.form-group input,
.form-group textarea {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 14px 18px;
  color: var(--text);
  font-family: 'Tajawal', sans-serif;
  font-size: 0.95rem;
  transition: border-color 0.3s;
  resize: none;
  outline: none;
}

.form-group input:focus,
.form-group textarea:focus {
  border-color: rgba(201,168,76,0.5);
}

.form-group input::placeholder,
.form-group textarea::placeholder {
  color: rgba(240,235,224,0.2);
}

.btn-submit {
  background: linear-gradient(135deg, var(--gold), var(--gold-dark));
  color: #1A1000;
  padding: 16px;
  border-radius: 12px;
  border: none;
  font-family: 'Tajawal', sans-serif;
  font-size: 1rem;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.3s;
  box-shadow: 0 8px 24px rgba(201,168,76,0.2);
}

.btn-submit:hover {
  transform: translateY(-2px);
  box-shadow: 0 14px 32px rgba(201,168,76,0.3);
}

.contact-alt {
  margin-top: 40px;
  display: flex;
  justify-content: center;
  gap: 24px;
  flex-wrap: wrap;
}

.contact-link {
  display: flex;
  align-items: center;
  gap: 8px;
  color: var(--text-muted);
  text-decoration: none;
  font-size: 0.9rem;
  transition: color 0.3s;
}

.contact-link:hover { color: var(--gold); }

/* FOOTER */
footer {
  padding: 40px 80px;
  background: #0D0D0D;
  border-top: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 20px;
}

.footer-logo {
  font-family: 'Amiri', serif;
  font-size: 1.4rem;
  color: var(--gold);
}

.footer-links {
  display: flex;
  gap: 28px;
  list-style: none;
}

.footer-links a {
  color: var(--text-muted);
  text-decoration: none;
  font-size: 0.85rem;
  transition: color 0.3s;
}

.footer-links a:hover { color: var(--gold); }

.footer-copy {
  color: rgba(240,235,224,0.2);
  font-size: 0.8rem;
}

/* DIVIDER */
.gold-line {
  height: 1px;
  background: linear-gradient(to right, transparent, var(--gold), transparent);
}

/* REVEAL */
.reveal {
  opacity: 0;
  transform: translateY(36px);
  transition: opacity 0.7s ease, transform 0.7s ease;
}
.reveal.visible {
  opacity: 1;
  transform: none;
}

/* RESPONSIVE */
@media (max-width: 900px) {
  .hero { grid-template-columns: 1fr; padding: 100px 32px 60px; text-align: center; }
  .hero-desc { max-width: 100%; margin-left: auto; }
  .hero-btns { justify-content: center; }
  .hero-visual { order: -1; }
  .phone-mockup { width: 220px; }
  .features { padding: 80px 32px; }
  .features-grid { grid-template-columns: 1fr 1fr; }
  .screenshots { padding: 80px 32px; }
  .contact { padding: 80px 32px; }
  footer { padding: 32px; justify-content: center; text-align: center; }
  .form-row { grid-template-columns: 1fr; }
  nav { padding: 16px 24px; }
  .nav-links { display: none; }
}

@media (max-width: 600px) {
  .features-grid { grid-template-columns: 1fr; }
  .screens-showcase { gap: 20px; }
  .screen-item.featured { transform: none; }
}
</style>
</head>
<body>

<!-- NAV -->
<nav>
  <div class="nav-logo">نديم</div>
  <ul class="nav-links">
    <li><a href="#features">المميزات</a></li>
    <li><a href="#screenshots">لقطات الشاشة</a></li>
    <li><a href="#contact">تواصل معنا</a></li>
    <li><a href="index.html">الخصوصية</a></li>
  </ul>
</nav>

<!-- HERO -->

  <div class="hero-text">
    <div class="hero-eyebrow">تطبيق تسميع القرآن الكريم</div>

    <div class="hero-btns">
